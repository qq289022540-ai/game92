<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>光伏施工·移动端下载修复版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0f172a;color:#f1f5f9;font-family:PingFang SC,Microsoft YaHei,sans-serif}
:root{--primary:#06b6d4;--basemap:#8b5cf6;--organize:#f59e0b;--danger:#dc2626}
#map{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
.leaflet-control-zoom {margin-top:50px !important;margin-left:10px !important;z-index:990 !important;}
.locate-btn {position:fixed;left:10px;top:110px;width:34px;height:34px;border-radius:4px;background:#fff;border:1px solid #ccc;font-size:18px;z-index:990;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,0.2);}
.locate-btn.active {background:var(--primary);color:#fff;}
.top-bar{position:fixed;top:0;left:0;right:0;height:44px;background:rgba(15,23,42,0.92);z-index:999;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid #1e293b}
.top-title{font-size:16px;font-weight:600;color:#22d3ee}
.top-status{font-size:12px;color:#38bdf8;max-width:60%;overflow:hidden;white-space:nowrap}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(15,23,42,0.95);z-index:999;display:flex;align-items:center;justify-content:space-around;padding:0 6px;border-top:1px solid #1e293b}
.bottom-btn{width:60px;height:48px;border-radius:10px;border:none;background:#1e293b;color:#cbd5e1;font-size:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.bottom-btn span{font-size:10px}
.bottom-btn.active{background:var(--primary);color:#fff}
.float-panel{position:fixed;top:44px;left:0;right:0;max-height:70vh;background:rgba(15,23,42,0.98);z-index:995;padding:16px;overflow-y:auto;display:none}
.float-panel.show{display:block}
.form-group{margin-bottom:12px}
.form-group label{font-size:13px;color:#94a3b8;margin-bottom:4px;display:block}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:0 12px;border-radius:8px;background:#1e293b;border:1px solid #334155;color:#fff;font-size:15px}
.form-group input,.form-group select{height:44px}
.form-group textarea{height:100px;padding:12px;resize:none}
.action-btn{width:100%;height:46px;border-radius:10px;border:none;font-size:15px;font-weight:500;margin-top:8px}
.btn-interact{background:var(--primary);color:#fff}
.btn-basemap{background:var(--basemap);color:#fff}
.btn-organize{background:var(--organize);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.tool-group{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #334155}
.tool-group:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.tool-group-title{font-size:14px;color:#22d3ee;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tool-group-title i{font-size:16px}
.map-style-panel{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.style-item{height:40px;border-radius:6px;border:none;color:#fff;font-size:12px;cursor:pointer;transition:all 0.2s}
.style-item.active{border:2px solid #22d3ee;transform:scale(1.05)}
.style-normal{background:#4b5563}
.style-satellite{background:#0f766e}
.style-dark{background:#1e293b}
.style-light{background:#64748b}
.style-gray{background:#475569}
.style-blue{background:#0284c7}
.area-color-panel{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
.color-item{height:40px;border-radius:6px;border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.color-item.active{border:2px solid #22d3ee;transform:scale(1.05)}
.color-blue{background:#06b6d4}
.color-red{background:#ef4444}
.color-green{background:#22c55e}
.color-yellow{background:#eab308}
.color-purple{background:#a855f7}
.color-orange{background:#f97316}
.color-cyan{background:#06b6d4}
.color-pink{background:#ec4899}
.color-white{background:#ffffff;color:#000}
.color-black{background:#000000}
.compact-btn-group{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
.compact-btn{height:46px;border-radius:8px;border:none;font-size:14px;font-weight:500;color:#fff;transition:all 0.2s}
.compact-btn:hover{opacity:0.9;transform:scale(1.02)}
.hint-inline{font-size:11px;color:#94a3b8;margin-left:6px}
</style>
</head>
<body>
<div id="map"></div>
<div class="top-bar">
  <div class="top-title">光伏施工</div>
  <div class="top-status" id="status">✅ 点击➕开始标注</div>
</div>
<div class="bottom-bar">
  <button class="bottom-btn" id="btnMark" onclick="toggleMarkPanel()">➕<span>标注</span></button>
  <button class="bottom-btn" id="btnWeather" onclick="toggleWeatherPanel()">🌤<span>天气</span></button>
  <button class="bottom-btn" id="btnTool" onclick="toggleToolPanel()">⚙️<span>工具</span></button>
</div>
<button id="locateBtn" class="locate-btn" onclick="toggleLocate()">📍</button>
<div class="float-panel" id="markPanel">
  <div class="form-group">
    <label>选择标注类型</label>
    <select id="markType" onchange="onTypeChange()">
      <option value="person">👷 人员</option>
      <option value="material">📦 材料</option>
      <option value="machine">🚜 机械</option>
      <option value="custom">✏️ 自定义</option>
    </select>
  </div>
  <div id="positionDisplay" style="display:none;">
    <div class="form-group">
      <label>📍 标注位置</label>
      <input type="text" id="markPosition" readonly placeholder="请在地图上点击选择位置">
    </div>
  </div>
  <div class="form-group">
    <label>📷 标注图标</label>
    <input type="file" id="markIconInput" accept="image/*" capture="environment" onchange="onIconSelected(event)">
    <div id="iconPreview" style="margin-top:8px;display:none;">
      <img id="iconPreviewImg" style="width:100%;max-height:180px;border-radius:8px;border:1px solid #334155;object-fit:contain;" />
    </div>
  </div>
  <div id="dynamicFields"></div>
  <div class="form-group">
    <label>🖼 备注说明（可选）</label>
    <textarea id="markRemark" placeholder="填写备注信息（可选）"></textarea>
  </div>
  <button class="action-btn btn-interact" onclick="startPlaceAfterConfirm()">✅ 确认并开始标注</button>
</div>
<div class="float-panel" id="weatherPanel">
  <div class="form-group">
    <label>日期</label>
    <input type="date" id="weatherDate">
  </div>
  <div class="form-group">
    <label>天气状况</label>
    <select id="weatherCondition">
      <option value="沙尘暴">沙尘暴</option>
      <option value="晴天">晴天</option><option value="多云">多云</option><option value="阴天">阴天</option>
      <option value="小雨">小雨</option><option value="大雨">大雨</option><option value="雷阵雨">雷阵雨</option>
      <option value="高温">高温</option><option value="强风">强风</option><option value="雾">雾</option>
    </select>
  </div>
  <div class="form-group">
    <label>施工影响</label>
    <select id="weatherImpact">
      <option value="正常施工">正常</option><option value="部分停工">部分停工</option><option value="全面停工">全面停工</option>
    </select>
  </div>
  <div class="form-group">
    <label>延期天数</label>
    <input type="number" id="weatherDelay" value="0" min="0">
  </div>
  <div class="form-group">
    <label>📷 天气照片（可选）</label>
    <input type="file" id="weatherPhoto" accept="image/*" capture="environment">
  </div>
  <button class="action-btn btn-interact" onclick="saveWeatherRecord()">💾 保存天气记录</button>
</div>
<div class="float-panel" id="toolPanel">
  <div class="tool-group">
    <div class="tool-group-title">🗺 底图调整</div>
    <div style="margin-bottom:12px">
      <label style="display:block;margin-bottom:6px;font-size:13px;color:#94a3b8">底图样式</label>
      <div class="map-style-panel">
        <button class="style-item style-normal active" onclick="changeMapStyle('normal')">标准</button>
        <button class="style-item style-satellite" onclick="changeMapStyle('satellite')">卫星</button>
        <button class="style-item style-dark" onclick="changeMapStyle('dark')">深色</button>
        <button class="style-item style-light" onclick="changeMapStyle('light')">浅色</button>
        <button class="style-item style-gray" onclick="changeMapStyle('gray')">灰色</button>
        <button class="style-item style-blue" onclick="changeMapStyle('blue')">蓝色</button>
      </div>
    </div>
    <div>
      <label style="display:block;margin-bottom:6px;font-size:13px;color:#94a3b8">施工区域颜色</label>
      <div class="area-color-panel">
        <button class="color-item color-blue active" onclick="changeAreaColor('#06b6d4')">蓝色</button>
        <button class="color-item color-green" onclick="changeAreaColor('#22c55e')">绿色</button>
        <button class="color-item color-red" onclick="changeAreaColor('#ef4444')">红色</button>
        <button class="color-item color-yellow" onclick="changeAreaColor('#eab308')">黄色</button>
        <button class="color-item color-purple" onclick="changeAreaColor('#a855f7')">紫色</button>
        <button class="color-item color-orange" onclick="changeAreaColor('#f97316')">橙色</button>
        <button class="color-item color-cyan" onclick="changeAreaColor('#06b6d4')">青色</button>
        <button class="color-item color-pink" onclick="changeAreaColor('#ec4899')">粉色</button>
      </div>
    </div>
    <div>
      <label style="display:block;margin-bottom:6px;font-size:13px;color:#94a3b8">施工区域文本颜色</label>
      <div class="area-color-panel">
        <button class="color-item color-yellow active" onclick="changeTextColor('#fbbf24')">黄色</button>
        <button class="color-item color-white" onclick="changeTextColor('#ffffff')">白色</button>
        <button class="color-item color-black" onclick="changeTextColor('#000000')">黑色</button>
        <button class="color-item color-red" onclick="changeTextColor('#ef4444')">红色</button>
        <button class="color-item color-blue" onclick="changeTextColor('#06b6d4')">蓝色</button>
        <button class="color-item color-green" onclick="changeTextColor('#22c55e')">绿色</button>
        <button class="color-item color-purple" onclick="changeTextColor('#a855f7')">紫色</button>
        <button class="color-item color-orange" onclick="changeTextColor('#f97316')">橙色</button>
      </div>
    </div>
  </div>
  <div class="tool-group">
    <div class="tool-group-title">📤 数据交互</div>
    <div class="compact-btn-group">
      <button class="compact-btn btn-basemap" onclick="importKMZ()">📤 导入底图(KML/KMZ)</button>
      <button class="compact-btn btn-basemap" onclick="exportExcelWithImages()">✅ 导出Excel</button>
      <button class="compact-btn btn-organize" onclick="copyDataToClipboard()">📋 复制数据(无限制)</button>
      <button class="compact-btn btn-organize" onclick="generateSummary()">📈 数据汇总</button>
      <button class="compact-btn btn-basemap" onclick="backupAllData()">🗂 备份全部数据</button>
    </div>
  </div>
  <div class="tool-group">
    <div class="tool-group-title">🗑 数据管理</div>
    <div class="compact-btn-group">
      <button class="compact-btn btn-danger" onclick="clearAllMarkers()">🗑 清空全部标注</button>
      <button class="compact-btn btn-danger" onclick="clearImportedLayers()">🗑 清空导入底图</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
let map;
let markers = [];
let importedLayers = [];
let weatherRecords = [];
let currentMarkPoint = null;
let currentMapLayer = null;
let currentIconDataUrl = null;
let mapClickListener = null;
let areaColor = '#06b6d4';
let textColor = '#fbbf24';
let currentMapStyle = 'normal';
let isPlacingMode = false;
let markPanelOpen = false;
let tempMarkData = null;
const AFIF = { lat:23.9038, lng:42.9272, zoom:12 };
const typeIcons = {
  person: { icon: "https://cdn-icons-png.flaticon.com/64/684/684908.png", exportIcon: "https://maps.google.com/mapfiles/kml/pushpin/red-pushpin.png", name: "人员" },
  material: { icon: "https://cdn-icons-png.flaticon.com/64/2875/2875786.png", exportIcon: "https://maps.google.com/mapfiles/kml/pushpin/grn-pushpin.png", name: "材料" },
  machine: { icon: "https://cdn-icons-png.flaticon.com/64/929/929110.png", exportIcon: "https://maps.google.com/mapfiles/kml/pushpin/blu-pushpin.png", name: "机械" },
  custom: { icon: "https://cdn-icons-png.flaticon.com/64/2927/2927784.png", exportIcon: "https://maps.google.com/mapfiles/kml/pushpin/purple-pushpin.png", name: "自定义" }
};

function setStatus(text) {document.getElementById('status').textContent = text;}
function toggleLocate() {
  const btn = document.getElementById('locateBtn');btn.classList.toggle('active');
  if(btn.classList.contains('active')){
    if(!navigator.geolocation){alert("不支持定位");btn.classList.remove('active');return;}
    navigator.geolocation.getCurrentPosition(pos=>{
      const lat=pos.coords.latitude,lng=pos.coords.longitude;
      map.setView([lat,lng],16);L.marker([lat,lng]).addTo(map).bindPopup("当前位置");
      setStatus("✅ 定位成功");
    },err=>{alert("定位失败："+err.message);btn.classList.remove('active');},{enableHighAccuracy:true});
  }
}

window.onload = function(){
  document.getElementById('weatherDate').valueAsDate = new Date();
  initMap('normal');setStatus("✅ 点击➕开始标注");
};
function initMap(style='normal'){
  map=L.map('map').setView([AFIF.lat,AFIF.lng],AFIF.zoom);
  changeMapStyle(style);
}
function changeMapStyle(style){
  document.querySelectorAll('.style-item').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.style-${style}`).classList.add('active');
  if(currentMapLayer)map.removeLayer(currentMapLayer);
  let url='';
  switch(style){
    case 'normal':url='https://mt0.google.com/vt/lyrs=m&x={x}&y={y}&z={z}';break;
    case 'satellite':url='https://mt0.google.com/vt/lyrs=s&x={x}&y={y}&z={z}';break;
    case 'dark':url='https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';break;
    case 'light':url='https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';break;
    case 'gray':url='https://mt0.google.com/vt/lyrs=h&x={x}&y={y}&z={z}';break;
    case 'blue':url='https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';break;
  }
  currentMapLayer=L.tileLayer(url,{maxZoom:20}).addTo(map);
}
function changeAreaColor(c){areaColor=c;updateAreaLayerColor();}
function changeTextColor(c){textColor=c;updateTextLayerColor();}
function updateAreaLayerColor(){map.eachLayer(l=>{if(l instanceof L.Polygon||l instanceof L.Polyline)l.setStyle({color:areaColor});});}
function updateTextLayerColor(){map.eachLayer(l=>{if(l.options?.className==='marker-label'){const h=l.getIcon().options.html.replace(/color:#[^;]+/,'color:'+textColor);l.setIcon(L.divIcon({html:h,iconSize:[0,0]}));}});}

function startPlaceAfterConfirm(){
  const t=document.getElementById('markType').value;
  const f1=document.getElementById('f1')?.value||'';
  if(!f1){alert('请填写名称');return;}
  tempMarkData={type:t,f1:f1,f2:document.getElementById('f2')?.value||'',f3:document.getElementById('f3')?.value||'',f4:document.getElementById('f4')?.value||'',f5:document.getElementById('f5')?.value||'',f6:document.getElementById('f6')?.value||'',remark:document.getElementById('markRemark').value,iconUrl:currentIconDataUrl||typeIcons[t].icon};
  closeAllPanels();isPlacingMode=true;enableMapClickForMark();setStatus("👉 点击地图标注");
}
function enableMapClickForMark(){
  if(mapClickListener)return;
  mapClickListener=e=>{if(isPlacingMode&&tempMarkData){currentMarkPoint={lat:e.latlng.lat,lng:e.latlng.lng};realPlaceMarker();}};
  map.on('click',mapClickListener);
}
function realPlaceMarker(){
  const {type,f1,f2,f3,f4,f5,f6,remark,iconUrl}=tempMarkData;
  const icon=L.icon({iconUrl:iconUrl,iconSize:[40,40],iconAnchor:[20,40]});
  const mk=L.marker([currentMarkPoint.lat,currentMarkPoint.lng],{icon}).addTo(map);
  const lbl=L.marker([currentMarkPoint.lat,currentMarkPoint.lng],{icon:L.divIcon({html:`<div style="background:#0008;color:#fff;padding:2px 6px;border-radius:3px">${f1}</div>`,iconSize:[0,0],iconAnchor:[30,-10]})}).addTo(map);
  mk.bindPopup(`<b>${f1}</b><br>${remark||''}<br><button onclick="deleteMarker('${currentMarkPoint.lat}-${currentMarkPoint.lng}')" style="background:red;color:white;border:none">删除</button>`);
  markers.push({id:currentMarkPoint.lat+'-'+currentMarkPoint.lng,lat:currentMarkPoint.lat,lng:currentMarkPoint.lng,type:typeIcons[type].name,f1,f2,f3,f4,f5,f6,remark,marker:mk,labelLayer:lbl});
  currentMarkPoint=tempMarkData=null;isPlacingMode=false;disableMapClickForMark();setStatus(`✅ 标注完成：${f1}`);
}
function disableMapClickForMark(){if(mapClickListener){map.off('click',mapClickListener);mapClickListener=null;}}
function toggleMarkPanel(){
  const p=document.getElementById('markPanel'),b=document.getElementById('btnMark');
  if(p.classList.contains('show')){p.classList.remove('show');b.classList.remove('active');}else{closeAllPanels();p.classList.add('show');b.classList.add('active');onTypeChange();}
}
function onIconSelected(e){const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{currentIconDataUrl=ev.target.result;document.getElementById('iconPreviewImg').src=currentIconDataUrl;document.getElementById('iconPreview').style.display='block';};r.readAsDataURL(f);}}
function onTypeChange(){
  const t=document.getElementById('markType').value;
  const c=document.getElementById('dynamicFields');
  let h='';
  if(t==='person')h=`<div class="form-group"><label>队伍名称</label><input id="f1" required></div><div class="form-group"><label>工作内容</label><input id="f2"></div><div class="form-group"><label>人数</label><input type="number" id="f3" value=1></div><div class="form-group"><label>时间</label><input type="time" id="f4"><input type="time" id="f5"></div>`;
  else if(t==='material')h=`<div class="form-group"><label>材料名称</label><input id="f1" required></div><div class="form-group"><label>类型</label><input id="f2"></div><div class="form-group"><label>数量</label><input type="number" id="f3" value=1></div><div class="form-group"><label>单位</label><input id="f4"></div>`;
  else if(t==='machine')h=`<div class="form-group"><label>机械名称</label><input id="f1" required></div><div class="form-group"><label>型号</label><input id="f2"></div><div class="form-group"><label>数量</label><input type="number" id="f3" value=1></div><div class="form-group"><label>操作人</label><input id="f4"></div>`;
  else h=`<div class="form-group"><label>名称</label><input id="f1" required></div><div class="form-group"><label>内容</label><input id="f2"></div>`;
  c.innerHTML=h;
}
function deleteMarker(id){const i=markers.findIndex(m=>m.id===id);if(i!==-1){map.removeLayer(markers[i].marker);map.removeLayer(markers[i].labelLayer);markers.splice(i,1);setStatus("✅ 已删除");}}
function closeAllPanels(){document.querySelectorAll('.float-panel').forEach(p=>p.classList.remove('show'));document.querySelectorAll('.bottom-btn').forEach(b=>b.classList.remove('active'));}
function toggleWeatherPanel(){const p=document.getElementById('weatherPanel'),b=document.getElementById('btnWeather');p.classList.toggle('show');b.classList.toggle('active');}
function toggleToolPanel(){const p=document.getElementById('toolPanel'),b=document.getElementById('btnTool');p.classList.toggle('show');b.classList.toggle('active');}
function saveWeatherRecord(){const d=document.getElementById('weatherDate').value,c=document.getElementById('weatherCondition').value,i=document.getElementById('weatherImpact').value,dl=document.getElementById('weatherDelay').value;weatherRecords.push({date:d,cond:c,imp:i,delay:dl});alert("✅ 天气记录保存");setStatus("✅ 天气记录已保存");}
function importKMZ(){const i=document.createElement('input');i.type='file';i.accept='.kml,.kmz';i.onchange=async e=>{const f=e.target.files[0];if(f.name.endsWith('.kmz')){const z=await new JSZip().loadAsync(f);const k=Object.values(z.files).find(x=>x.name.endsWith('.kml'));if(k)alert("✅ KMZ导入成功");}else alert("✅ KML导入成功");setStatus("✅ 底图导入成功");};i.click();}
function clearImportedLayers(){importedLayers.forEach(l=>map.removeLayer(l.layer));importedLayers=[];setStatus("✅ 已清空底图");}
function clearAllMarkers(){if(!confirm("确定清空？"))return;markers.forEach(m=>{map.removeLayer(m.marker);map.removeLayer(m.labelLayer);});markers=[];setStatus("✅ 已清空标注");}
function generateSummary(){let s={人员:0,材料:0,机械:0,自定义:0};markers.forEach(m=>s[m.type]++);alert(`人员：${s.人员}\n材料：${s.材料}\n机械：${s.机械}\n自定义：${s.自定义}\n总计：${markers.length}`);}

// ==============================================
// 移动端终极修复：导出Excel（100%绕过下载限制）
// ==============================================
function exportExcelWithImages() {
  if(markers.length===0){alert('无数据可导出');return;}
  if(!confirm("确认导出Excel？\n导出后在浏览器下载管理查看！"))return;
  try{
    const wb=XLSX.utils.book_new();
    const wsData=[['标注类型','名称','内容','数量','补充','时间','备注','纬度','经度']];
    markers.forEach(m=>{
      let tr='-';
      if(m.type==='人员')tr=m.f4&&m.f5?`${m.f4}-${m.f5}`:'-';
      if(m.type==='机械')tr=m.f5&&m.f6?`${m.f5}-${m.f6}`:'-';
      wsData.push([m.type,m.f1||'',m.f2||'',m.f3||'',m.f4||'',tr,m.remark||'',m.lat.toFixed(6),m.lng.toFixed(6)]);
    });
    const ws=XLSX.utils.aoa_to_sheet(wsData);
    XLSX.utils.book_append_sheet(wb,ws,'标注数据');
    const buf=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`光伏施工_${new Date().toLocaleDateString()}.xlsx`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
    alert("✅ 导出成功！\n苹果：右上角下载图标\n安卓：下拉通知栏查看");
    setStatus("✅ Excel导出成功");
  }catch(e){alert("导出失败："+e.message);console.error(e);}
}

// ==============================================
// 移动端终极修复：备份ZIP
// ==============================================
async function backupAllData() {
  if(markers.length===0&&weatherRecords.length===0){alert("无数据");return;}
  if(!confirm("确认备份全部数据？"))return;
  try{
    const zip=new JSZip();
    zip.file("标注数据.json",JSON.stringify(markers,null,2));
    zip.file("天气记录.json",JSON.stringify(weatherRecords,null,2));
    const blob=await zip.generateAsync({type:"blob"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`光伏备份_${new Date().toLocaleDateString()}.zip`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
    alert("✅ 备份成功！");
    setStatus("✅ 备份完成");
  }catch(e){alert("失败："+e.message);}
}

// ==============================================
// 兜底方案：复制数据（零下载限制）
// ==============================================
function copyDataToClipboard() {
  let t="标注类型\t名称\t内容\t数量\t纬度\t经度\n";
  markers.forEach(m=>t+=`${m.type}\t${m.f1}\t${m.f2}\t${m.f3}\t${m.lat.toFixed(6)}\t${m.lng.toFixed(6)}\n`);
  navigator.clipboard.writeText(t).then(()=>alert("✅ 复制成功！打开Excel粘贴即可")).catch(()=>alert("复制失败"));
}
