<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>光伏施工·简化集成版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
#root{ }
html,body{width:100%;height:100%;overflow:hidden;background:#0f172a;color:#f1f5f9;font-family:PingFang SC,Microsoft YaHei,sans-serif}
:root{--primary:#06b6d4;--basemap:#8b5cf6;--organize:#f59e0b;--danger:#dc2626}
#map{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}

/* ========== 地图控件修复：缩放 + 定位 显示完整 ========== */
.leaflet-control-zoom {
  margin-top: 50px !important; /* 下移避开顶部栏 */
  margin-left: 10px !important;
  z-index: 990 !important;
}
.locate-btn {
  position: fixed;
  left: 10px;
  top: 110px;          /* 放在缩放按钮下面 */
  width: 34px;
  height: 34px;
  border-radius: 4px;
  background: #fff;
  border: 1px solid #ccc;
  font-size: 18px;
  z-index: 990;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 1px 5px rgba(0,0,0,0.2);
}
.locate-btn.active {
  background: var(--primary);
  color: #fff;
}

.top-bar{position:fixed;top:0;left:0;right:0;height:44px;background:rgba(15,23,42,0.92);z-index:999;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid #1e293b}
.top-title{font-size:16px;font-weight:600;color:#22d3ee}
.top-status{font-size:12px;color:#38bdf8;max-width:60%;overflow:hidden;white-space:nowrap}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(15,23,42,0.95);z-index:999;display:flex;align-items:center;justify-content:space-around;padding:0 6px;border-top:1px solid #1e293b}
.bottom-btn{width:60px;height:48px;border-radius:10px;border:none;background:#1e293b;color:#cbd5e1;font-size:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.bottom-btn span{font-size:10px}
.bottom-btn.active{background:var(--primary);color:#fff}
.float-panel{position:fixed;top:44px;left:0;right:0;max-height:70vh;background:rgba(15,23,42,0.98);z-index:995;padding:16px;overflow-y:auto;display:none}
.float-panel.show{display:block}
.form-group{margin-bottom:12px}
.form-group label{font-size:13px;color:#94a3b8;margin-bottom:4px;display:block}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:0 12px;border-radius:8px;background:#1e293b;border:1px solid #334155;color:#fff;font-size:15px}
.form-group input,.form-group select{height:44px}
.form-group textarea{height:100px;padding:12px;resize:none}
.action-btn{width:100%;height:46px;border-radius:10px;border:none;font-size:15px;font-weight:500;margin-top:8px}
.btn-interact{background:var(--primary);color:#fff}
.btn-basemap{background:var(--basemap);color:#fff}
.btn-organize{background:var(--organize);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.tool-group{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #334155}
.tool-group:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.tool-group-title{font-size:14px;color:#22d3ee;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tool-group-title i{font-size:16px}
.map-style-panel{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.style-item{height:40px;border-radius:6px;border:none;color:#fff;font-size:12px;cursor:pointer;transition:all 0.2s}
.style-item.active{border:2px solid #22d3ee;transform:scale(1.05)}
.style-normal{background:#4b5563}
.style-satellite{background:#0f766e}
.style-dark{background:#1e293b}
.style-light{background:#64748b}
.style-gray{background:#475569}
.style-blue{background:#0284c7}
.area-color-panel{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
.color-item{height:40px;border-radius:6px;border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.color-item.active{border:2px solid #22d3ee;transform:scale(1.05)}
.color-blue{background:#06b6d4}
.color-red{background:#ef4444}
.color-green{background:#22c55e}
.color-yellow{background:#eab308}
.color-purple{background:#a855f7}
.color-orange{background:#f97316}
.color-cyan{background:#06b6d4}
.color-pink{background:#ec4899}
.color-white{background:#ffffff;color:#000}
.color-black{background:#000000}
.compact-btn-group{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
.compact-btn{height:46px;border-radius:8px;border:none;font-size:14px;font-weight:500;color:#fff;transition:all 0.2s}
.compact-btn:hover{opacity:0.9;transform:scale(1.02)}
.hint-inline{font-size:11px;color:#94a3b8;margin-left:6px}

/* 多图预览样式 */
.photos-preview {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.photo-item {
  width: 80px;
  height: 80px;
  border-radius: 6px;
  border: 1px solid #334155;
  overflow: hidden;
  position: relative;
}
.photo-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.photo-remove {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 18px;
  height: 18px;
  background: rgba(220, 38, 38, 0.8);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  cursor: pointer;
}
.add-photo-btn {
  width: 80px;
  height: 80px;
  border-radius: 6px;
  border: 1px dashed #334155;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #94a3b8;
  font-size: 24px;
  cursor: pointer;
}
.add-photo-btn:hover {
  background: rgba(30, 41, 59, 0.8);
}
</style>
</head>
<body>
<div id="map"></div>
<div class="top-bar">
  <div class="top-title">光伏施工</div>
  <div class="top-status" id="status">✅ 点击➕开始标注</div>
</div>
<div class="bottom-bar">
  <button class="bottom-btn" id="btnMark" onclick="toggleMarkPanel()">➕<span>标注</span></button>
  <button class="bottom-btn" id="btnWeather" onclick="toggleWeatherPanel()">🌤<span>天气</span></button>
  <button class="bottom-btn" id="btnTool" onclick="toggleToolPanel()">⚙️<span>工具</span></button>
</div>
<button id="locateBtn" class="locate-btn" onclick="toggleLocate()">📍</button>

<!-- 标注面板 -->
<div class="float-panel" id="markPanel">
  <div class="form-group">
    <label>选择标注类型</label>
    <select id="markType" onchange="onTypeChange()">
      <option value="person">👷 人员</option>
      <option value="material">📦 材料</option>
      <option value="machine">🚜 机械</option>
      <option value="custom">✏️ 自定义</option>
    </select>
  </div>
  <div id="positionDisplay" style="display:none;">
    <div class="form-group">
      <label>📍 标注位置</label>
      <input type="text" id="markPosition" readonly placeholder="请在地图上点击选择位置">
    </div>
  </div>
  <div class="form-group">
    <label>📷 标注图片（最多5张，首张为图标）</label>
    <input type="file" id="markPhotosInput" accept="image/*" multiple style="display:none;" onchange="onMarkPhotosSelected(event)">
    <div class="add-photo-btn" onclick="document.getElementById('markPhotosInput').click()">+</div>
    <div id="markPhotosPreview" class="photos-preview"></div>
  </div>
  <div id="dynamicFields"></div>
  <div class="form-group">
    <label>🖼 备注说明（可选）</label>
    <textarea id="markRemark" placeholder="填写备注信息（可选）"></textarea>
  </div>
  <button class="action-btn btn-interact" onclick="startPlaceAfterConfirm()">✅ 确认并开始标注</button>
</div>

<!-- 天气面板 -->
<div class="float-panel" id="weatherPanel">
  <div class="form-group">
    <label>日期</label>
    <input type="date" id="weatherDate">
  </div>
  <div class="form-group">
    <label>天气状况</label>
    <select id="weatherCondition">
      <option value="沙尘暴">沙尘暴</option>
      <option value="晴天">晴天</option><option value="多云">多云</option><option value="阴天">阴天</option>
      <option value="小雨">小雨</option><option value="大雨">大雨</option><option value="雷阵雨">雷阵雨</option>
      <option value="高温">高温</option><option value="强风">强风</option><option value="雾">雾</option>
    </select>
  </div>
  <div class="form-group">
    <label>施工影响</label>
    <select id="weatherImpact">
      <option value="正常施工">正常</option><option value="部分停工">部分停工</option><option value="全面停工">全面停工</option>
    </select>
  </div>
  <div class="form-group">
    <label>延期天数</label>
    <input type="number" id="weatherDelay" value="0">
  </div>
  <div class="form-group">
    <label>📷 天气照片（最多5张）</label>
    <input type="file" id="weatherPhotosInput" accept="image/*" multiple style="display:none;" onchange="onWeatherPhotosSelected(event)">
    <div class="add-photo-btn" onclick="document.getElementById('weatherPhotosInput').click()">+</div>
    <div id="weatherPhotosPreview" class="photos-preview"></div>
  </div>
  <button class="action-btn btn-interact" onclick="saveWeatherRecord()">💾 保存天气记录</button>
</div>

<!-- 工具面板 -->
<div class="float-panel" id="toolPanel">
  <div class="tool-group">
    <div class="tool-group-title">🗺 底图调整</div>
    <div style="margin-bottom:12px">
      <label style="display:block;margin-bottom:6px;font-size:13px;color:#94a3b8">底图样式</label>
      <div class="map-style-panel">
        <button class="style-item style-normal active" onclick="changeMapStyle('normal')">标准</button>
        <button class="style-item style-satellite" onclick="changeMapStyle('satellite')">卫星</button>
        <button class="style-item style-dark" onclick="changeMapStyle('dark')">深色</button>
        <button class="style-item style-light" onclick="changeMapStyle('light')">浅色</button>
        <button class="style-item style-gray" onclick="changeMapStyle('gray')">灰色</button>
        <button class="style-item style-blue" onclick="changeMapStyle('blue')">蓝色</button>
      </div>
    </div>
    <div>
      <label style="display:block;margin-bottom:6px;font-size:13px;color:#94a3b8">施工区域颜色</label>
      <div class="area-color-panel">
        <button class="color-item color-blue active" onclick="changeAreaColor('#06b6d4')">蓝色</button>
        <button class="color-item color-green" onclick="changeAreaColor('#22c55e')">绿色</button>
        <button class="color-item color-red" onclick="changeAreaColor('#ef4444')">红色</button>
        <button class="color-item color-yellow" onclick="changeAreaColor('#eab308')">黄色</button>
        <button class="color-item color-purple" onclick="changeAreaColor('#a855f7')">紫色</button>
        <button class="color-item color-orange" onclick="changeAreaColor('#f97316')">橙色</button>
        <button class="color-item color-cyan" onclick="changeAreaColor('#06b6d4')">青色</button>
        <button class="color-item color-pink" onclick="changeAreaColor('#ec4899')">粉色</button>
      </div>
    </div>
    <div>
      <label style="display:block;margin-bottom:6px;font-size:13px;color:#94a3b8">施工区域文本颜色</label>
      <div class="area-color-panel">
        <button class="color-item color-yellow active" onclick="changeTextColor('#fbbf24')">黄色</button>
        <button class="color-item color-white" onclick="changeTextColor('#ffffff')">白色</button>
        <button class="color-item color-black" onclick="changeTextColor('#000000')">黑色</button>
        <button class="color-item color-red" onclick="changeTextColor('#ef4444')">红色</button>
        <button class="color-item color-blue" onclick="changeTextColor('#06b6d4')">蓝色</button>
        <button class="color-item color-green" onclick="changeTextColor('#22c55e')">绿色</button>
        <button class="color-item color-purple" onclick="changeTextColor('#a855f7')">紫色</button>
        <button class="color-item color-orange" onclick="changeTextColor('#f97316')">橙色</button>
      </div>
    </div>
  </div>
  <div class="tool-group">
    <div class="tool-group-title">📤 数据交互</div>
    <div class="compact-btn-group">
      <button class="compact-btn btn-basemap" onclick="importKMZ()">📤 导入底图(KML/KMZ)</button>
      <button class="compact-btn btn-basemap" onclick="exportKMZ()">✅ 导出KMZ（含底图）<span class="hint-inline">下载后请发送微信</span></button>
      <button class="compact-btn btn-organize" onclick="saveDataToDesktop()">📊 导出Excel<span class="hint-inline">下载后请发送微信</span></button>
      <button class="compact-btn btn-organize" onclick="generateSummary()">📈 数据汇总</button>
      <button class="compact-btn btn-basemap" onclick="backupAllData()">🗂 导出全部数据<span class="hint-inline">包含Excel/KMZ/照片/图标</span></button>
    </div>
  </div>
  <div class="tool-group">
    <div class="tool-group-title">🗑 数据管理</div>
    <div class="compact-btn-group">
      <button class="compact-btn btn-danger" onclick="clearAllMarkers()">🗑 清空全部标注</button>
      <button class="compact-btn btn-danger" onclick="clearImportedLayers()">🗑 清空导入底图</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
let map;
let markers = [];
let importedLayers = [];
let weatherRecords = [];
let currentMarkPoint = null;
let currentMapLayer = null;
let currentMarkPhotos = [];
let currentWeatherPhotos = [];
let mapClickListener = null;
let areaColor = '#06b6d4';
let textColor = '#fbbf24';
let currentMapStyle = 'normal';
let isPlacingMode = false;
let markPanelOpen = false;
let tempMarkData = null;
let lastExportCount = 0;
const AFIF = { lat:23.9038, lng:42.9272, zoom:12 };
const typeIcons = {
  person: { icon: "https://cdn-icons-png.flaticon.com/64/684/684908.png", exportIcon: "https://maps.google.com/mapfiles/kml/pushpin/red-pushpin.png", name: "人员" },
  material: { icon: "https://cdn-icons-png.flaticon.com/64/2875/2875786.png", exportIcon: "https://maps.google.com/mapfiles/kml/pushpin/grn-pushpin.png", name: "材料" },
  machine: { icon: "https://cdn-icons-png.flaticon.com/64/929/929110.png", exportIcon: "https://maps.google.com/mapfiles/kml/pushpin/blu-pushpin.png", name: "机械" },
  custom: { icon: "https://cdn-icons-png.flaticon.com/64/2927/2927784.png", exportIcon: "https://maps.google.com/mapfiles/kml/pushpin/purple-pushpin.png", name: "自定义" }
};

window.onload = function(){
  document.getElementById('weatherDate').valueAsDate = new Date();
  initMap('normal');
  setStatus("✅ 点击➕开始标注");
};

function initMap(style = 'normal'){
  map = L.map('map').setView([AFIF.lat, AFIF.lng], AFIF.zoom);
  changeMapStyle(style);
}

function changeMapStyle(style){
  document.querySelectorAll('.style-item').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.style-${style}`).classList.add('active');
  if(currentMapLayer) map.removeLayer(currentMapLayer);
  let tileUrl = '';
  switch(style){
    case 'normal': tileUrl = 'https://mt0.google.com/vt/lyrs=m&x={x}&y={y}&z={z}'; break;
    case 'satellite': tileUrl = 'https://mt0.google.com/vt/lyrs=s&x={x}&y={y}&z={z}'; break;
    case 'dark': tileUrl = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'; break;
    case 'light': tileUrl = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'; break;
    case 'gray': tileUrl = 'https://mt0.google.com/vt/lyrs=h&x={x}&y={y}&z={z}'; break;
    case 'blue': tileUrl = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'; break;
  }
  currentMapStyle = style;
  currentMapLayer = L.tileLayer(tileUrl,{attribution:'Google | CartoDB',maxZoom:20}).addTo(map);
  setStatus(`✅ 底图已切换为${style === 'normal' ? '标准' : style === 'satellite' ? '卫星' : style === 'dark' ? '深色' : style === 'light' ? '浅色' : style === 'gray' ? '灰色' : '蓝色'}样式`);
  updateAreaLayerColor();
}

function changeAreaColor(color){
  document.querySelectorAll('.color-item').forEach(btn => { if(btn.onclick.toString().includes('changeAreaColor')) btn.classList.remove('active'); });
  document.querySelectorAll('.color-item').forEach(btn => { if(btn.onclick.toString().includes('changeAreaColor') && btn.onclick.toString().includes(color)) btn.classList.add('active'); });
  areaColor = color; updateAreaLayerColor(); setStatus(`✅ 施工区域颜色已改为${getColorName(color)}`);
}

function changeTextColor(color){
  document.querySelectorAll('.color-item').forEach(btn => { if(btn.onclick.toString().includes('changeTextColor')) btn.classList.remove('active'); });
  document.querySelectorAll('.color-item').forEach(btn => { if(btn.onclick.toString().includes('changeTextColor') && btn.onclick.toString().includes(color)) btn.classList.add('active'); });
  textColor = color; updateTextLayerColor(); setStatus(`✅ 施工区域文本颜色已改为${getTextColorName(color)}`);
}

function updateAreaLayerColor(){
  map.eachLayer(l => { if(l instanceof L.Polygon || l instanceof L.Polyline){ if(l.options && l.options.interactive === false){ try{ l.setStyle({ color: areaColor, fillColor: areaColor }); }catch(e){} } } });
}

function updateTextLayerColor(){
  map.eachLayer(l => { if(l.options?.className === 'marker-label'){ const newHtml = l.getIcon().options.html.replace(/color:#[0-9a-fA-F]{6}/, `color:${textColor}`); l.setIcon(L.divIcon({ className: 'marker-label', html: newHtml, iconSize: [0,0], iconAnchor: [18, -12] })); } });
}

function getColorName(color){ const colorMap = {'#06b6d4':'蓝色','#22c55e':'绿色','#ef4444':'红色','#eab308':'黄色','#a855f7':'紫色','#f97316':'橙色','#ec4899':'粉色'}; return colorMap[color] || color; }
function getTextColorName(color){ const colorMap = {'#fbbf24':'黄色','#ffffff':'白色','#000000':'黑色','#ef4444':'红色','#06b6d4':'蓝色','#22c55e':'绿色','#a855f7':'紫色','#f97316':'橙色'}; return colorMap[color] || color; }

function onMarkPhotosSelected(event) {
  const files = event.target.files;
  if (!files || files.length === 0) return;
  const newPhotos = Array.from(files).slice(0, 5 - currentMarkPhotos.length);
  if (newPhotos.length === 0) {
    alert('最多只能选择5张照片');
    return;
  }
  newPhotos.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      currentMarkPhotos.push({
        name: file.name,
        data: e.target.result,
        type: file.type
      });
      renderMarkPhotosPreview();
    };
    reader.readAsDataURL(file);
  });
}

function onWeatherPhotosSelected(event) {
  const files = event.target.files;
  if (!files || files.length === 0) return;
  const newPhotos = Array.from(files).slice(0, 5 - currentWeatherPhotos.length);
  if (newPhotos.length === 0) {
    alert('最多只能选择5张照片');
    return;
  }
  newPhotos.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      currentWeatherPhotos.push({
        name: file.name,
        data: e.target.result,
        type: file.type
      });
      renderWeatherPhotosPreview();
    };
    reader.readAsDataURL(file);
  });
}

function renderMarkPhotosPreview() {
  const previewContainer = document.getElementById('markPhotosPreview');
  previewContainer.innerHTML = '';
  currentMarkPhotos.forEach((photo, index) => {
    const photoItem = document.createElement('div');
    photoItem.className = 'photo-item';
    photoItem.innerHTML = `
      <img src="${photo.data}" alt="照片${index+1}">
      <div class="photo-remove" onclick="removeMarkPhoto(${index})">×</div>
    `;
    previewContainer.appendChild(photoItem);
  });
}

function renderWeatherPhotosPreview() {
  const previewContainer = document.getElementById('weatherPhotosPreview');
  previewContainer.innerHTML = '';
  currentWeatherPhotos.forEach((photo, index) => {
    const photoItem = document.createElement('div');
    photoItem.className = 'photo-item';
    photoItem.innerHTML = `
      <img src="${photo.data}" alt="照片${index+1}">
      <div class="photo-remove" onclick="removeWeatherPhoto(${index})">×</div>
    `;
    previewContainer.appendChild(photoItem);
  });
}

function removeMarkPhoto(index) {
  currentMarkPhotos.splice(index, 1);
  renderMarkPhotosPreview();
}

function removeWeatherPhoto(index) {
  currentWeatherPhotos.splice(index, 1);
  renderWeatherPhotosPreview();
}

function startPlaceAfterConfirm(){
  const type = document.getElementById('markType').value;
  const f1 = document.getElementById('f1')?.value || '';
  const f2 = document.getElementById('f2')?.value || '';
  const f3 = document.getElementById('f3')?.value || '';
  const f4 = document.getElementById('f4')?.value || '';
  const f5 = document.getElementById('f5')?.value || '';
  const f6 = document.getElementById('f6')?.value || '';
  const remark = document.getElementById('markRemark').value.trim();
  const iconInfo = typeIcons[type];
  
  const firstPhotoUrl = currentMarkPhotos.length > 0 ? currentMarkPhotos[0].data : iconInfo.icon;
  const exportIconUrl = currentMarkPhotos.length > 0 ? currentMarkPhotos[0].data : iconInfo.exportIcon;

  tempMarkData = { 
    type, f1, f2, f3, f4, f5, f6, remark, 
    iconInfo, 
    iconUrl: firstPhotoUrl, 
    exportUrl: exportIconUrl,
    photos: [...currentMarkPhotos]
  };
  
  closeAllPanels();
  resetBottomBtnActive();
  disableMapClickForMark();
  isPlacingMode = true;
  enableMapClickForMark();
  setStatus("👉 已收起面板，请点击地图完成标注");
}

function enableMapClickForMark(){
  if(mapClickListener) return;
  mapClickListener = (e) => {
    if(isPlacingMode && tempMarkData){
      currentMarkPoint = { lat: e.latlng.lat, lng: e.latlng.lng };
      realPlaceMarker();
    }
  };
  map.on('click', mapClickListener);
}

function realPlaceMarker(){
  if(!currentMarkPoint || !tempMarkData) return;
  const { type, f1, f2, f3, f4, f5, f6, remark, iconInfo, iconUrl, exportUrl, photos } = tempMarkData;
  let label = f1 || iconInfo.name;
  
  const markerIcon = L.icon({ iconUrl, iconSize: [40,40], iconAnchor: [20,40] });
  const mk = L.marker([currentMarkPoint.lat, currentMarkPoint.lng], {icon: markerIcon}).addTo(map);
  
  const lbl = L.marker([currentMarkPoint.lat, currentMarkPoint.lng], {
    icon: L.divIcon({ html: `<div style="background:rgba(15,23,42,0.8);padding:2px 8px;border-radius:4px;color:${textColor};font-size:12px">${label}</div>`, iconSize: [0,0], iconAnchor: [30,-10] })
  }).addTo(map);
  
  const timeLine = (type === 'person' && f4 && f5) ? `时间：${f4}-${f5}<br>` : (type === 'machine' && f5 && f6) ? `时间：${f5}-${f6}<br>` : '';
  const extra = (type === 'material' && f4) ? `单位：${f4}<br>` : (type === 'machine' && f4) ? `操作人员：${f4}<br>` : '';
  const numInfo = (f3 && (type === 'material' || type === 'machine')) ? `数量：${f3}<br>` : (type === 'person' && f3) ? `人数：${f3}<br>` : '';
  const photoCount = photos.length > 0 ? `照片数：${photos.length}张<br>` : '';
  const popup = `
<b>${label}</b><br>类型：${iconInfo.name}<br>内容：${f2}<br>${numInfo}${timeLine}${extra}${photoCount}${remark?'备注：'+remark+'<br>':''}
<button onclick="deleteMarker('${currentMarkPoint.lat}-${currentMarkPoint.lng}')" style="margin-top:6px;padding:4px 8px;background:#dc2626;color:#fff;border:none;border-radius:4px">删除</button>`;
  
  mk.bindPopup(popup);
  mk.on('contextmenu',()=>{if(confirm('确定删除？'))deleteMarker(currentMarkPoint.lat+'-'+currentMarkPoint.lng)});
  
  markers.push({
    id: currentMarkPoint.lat+'-'+currentMarkPoint.lng, lat: currentMarkPoint.lat, lng: currentMarkPoint.lng,
    type: iconInfo.name, label, f1,f2,f3,f4,f5,f6,remark, 
    iconUrl: exportUrl, 
    photos: photos,
    marker:mk, labelLayer:lbl
  });
  
  currentMarkPoint = null;
  tempMarkData = null;
  currentMarkPhotos = [];
  renderMarkPhotosPreview();
  isPlacingMode = false;
  disableMapClickForMark();
  setStatus(`✅ 标注完成：${label}（照片${photos.length}张）`);
}

async function importKMZ(){
  clearImportedLayers();
  let input = document.createElement('input');
  input.type = 'file';
  input.accept = '.kml,.kmz';
  input.onchange = async e => {
    try {
      let file = e.target.files[0];
      let content = "";
      if (file.name.endsWith('.kmz')) {
        let zip = new JSZip();
        let archive = await zip.loadAsync(file);
        let kmlFile = Object.values(archive.files).find(f => f.name.endsWith('.kml'));
        if (!kmlFile) { alert("KMZ中未找到KML文件"); return; }
        content = await kmlFile.async('text');
      } else {
        content = await file.text();
      }
      let parser = new DOMParser();
      let xml = parser.parseFromString(content, 'application/xml');
      let bounds = L.latLngBounds();
      xml.querySelectorAll('Placemark').forEach((placemark, i) => {
        let name = placemark.querySelector('name')?.textContent || `区域${i+1}`;
        let pureName = name.replace(/区域/g, "").replace(/[\s_()（）]/g, "");
        let coordText = placemark.querySelector('coordinates')?.textContent || '';
        let coords = coordText.trim().split(/\s+/).filter(c => c.includes(',')).map(c => {
          let [lng, lat] = c.split(',');
          return [parseFloat(lng), parseFloat(lat)];
        }).filter(c => !isNaN(c[0]) && !isNaN(c[1]));
        if (coords.length === 0) return;
        if (coords.length === 1) {
          let [lng, lat] = coords[0];
          let lbl = L.marker([lat, lng], {
            icon: L.divIcon({
              className: 'marker-label',
              html: `<span style="color:${textColor};font-size:16px">${pureName}</span>`,
              iconSize: [0, 0], iconAnchor: [18, -12]
            }),
            interactive: false
          }).addTo(map);
          importedLayers.push({ type: 'label', lat, lng, name: pureName });
          bounds.extend([lat, lng]);
        } else {
          let latlngs = coords.map(([lng, lat]) => [lat, lng]);
          if (placemark.querySelector('Polygon')) {
            L.polygon(latlngs, {
              color: areaColor, weight: 2, dashArray: '2,2', fillOpacity: 0.08, interactive: false
            }).addTo(map);
            importedLayers.push({ type: 'polygon', latlngs });
            bounds.extend(latlngs);
          } else {
            L.polyline(latlngs, {
              color: areaColor, weight: 2, dashArray: '2,2', interactive: false
            }).addTo(map);
            importedLayers.push({ type: 'polyline', latlngs });
            bounds.extend(latlngs);
          }
        }
      });
      if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50] });
      setStatus("✅ 底图导入成功");
    } catch (err) {
      alert("导入失败：" + err.message);
    }
  };
  input.click();
}

async function exportKMZ() {
  if (markers.length === 0 && importedLayers.length === 0) {
    alert("无数据可导出");
    return;
  }

  const zip = new JSZip();
  const photosFolder = zip.folder("标注照片");
  const weatherPhotosFolder = zip.folder("天气照片");

  let kml = `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n  <Document>\n    <!-- 标注层 -->\n    <Folder>\n      <name>施工标注</name>`;

  for (const [markerIndex, m] of markers.entries()) {
    let iconBase64 = m.photos.length > 0 ? m.photos[0].data : await iconUrlToBase64(m.iconUrl || '');
    const iconStyleId = `icon_${m.id}`;
    
    m.photos.forEach((photo, photoIndex) => {
      const safeLabel = (m.label || `标注_${markerIndex+1}`).replace(/[^\w\-\u4e00-\u9fa5]/g, '_').slice(0, 64);
      const ext = photo.type.split('/')[1] || 'png';
      const fileName = `${safeLabel}_照片${photoIndex+1}.${ext}`;
      photosFolder.file(fileName, photo.data.split(',')[1], { base64: true });
    });

    kml += `\n      <Placemark>\n        <name>${m.label || '未命名标注'}</name>\n        <description>\n          类型：${m.type}<br>\n          内容：${m.f2 || '-'}<br>\n          照片数：${m.photos.length}张<br>\n          备注：${m.remark || '-'}<br>\n          经纬度：${m.lat.toFixed(6)}, ${m.lng.toFixed(6)}\n        </description>\n        <styleUrl>#${iconStyleId}</styleUrl>\n        <Point>\n          <coordinates>${m.lng.toFixed(6)},${m.lat.toFixed(6)},0</coordinates>\n        </Point>\n        <Style id="${iconStyleId}">\n          <IconStyle>\n            <Icon><href>${iconBase64}</href></Icon>\n          </IconStyle>\n        </Style>\n      </Placemark>`;
  }

  kml += `\n    </Folder>\n    <Folder>\n      <name>施工底图</name>\n      <Style id="areaStyle">\n        <LineStyle>\n          <color>${hexToKmlColor(areaColor)}</color>\n          <width>2</width>\n        </LineStyle>\n        <PolyStyle>\n          <color>${hexToKmlColor(areaColor, 0.08)}</color>\n        </PolyStyle>\n      </Style>`;

  importedLayers.forEach((lay) => {
    if (lay.type === 'label') {
      kml += `\n        <Placemark>\n          <name>${lay.name || '未命名标签'}</name>\n          <Point>\n            <coordinates>${lay.lng},${lay.lat},0</coordinates>\n          </Point>\n          <Style>\n            <LabelStyle>\n              <color>${hexToKmlColor(textColor)}</color>\n              <scale>1.2</scale>\n            </LabelStyle>\n          </Style>\n        </Placemark>`;
    }
    if (lay.type === 'polyline') {
      const coords = lay.latlngs.map((p) => `${p[1]},${p[0]},0`).join(' ');
      kml += `\n        <Placemark>\n          <name>施工线路</name>\n          <styleUrl>#areaStyle</styleUrl>\n          <LineString>\n            <coordinates>${coords}</coordinates>\n          </LineString>\n        </Placemark>`;
    }
    if (lay.type === 'polygon') {
      const coords = lay.latlngs.map((p) => `${p[1]},${p[0]},0`).join(' ');
      kml += `\n        <Placemark>\n          <name>施工区域</name>\n          <styleUrl>#areaStyle</styleUrl>\n          <Polygon>\n            <outerBoundaryIs>\n              <LinearRing>\n                <coordinates>${coords}</coordinates>\n              </LinearRing>\n            </outerBoundaryIs>\n          </Polygon>\n        </Placemark>`;
    }
  });

  kml += `\n    </Folder>\n    <Folder>\n      <name>天气记录</name>`;
  weatherRecords.forEach((w, index) => {
    w.photos.forEach((photo, photoIndex) => {
      const ext = photo.type.split('/')[1] || 'png';
      const fileName = `天气记录_${index+1}_照片${photoIndex+1}.${ext}`;
      weatherPhotosFolder.file(fileName, photo.data.split(',')[1], { base64: true });
    });

    kml += `\n        <Placemark>\n          <name>天气记录_${index+1}</name>\n          <description>\n            日期：${w.date}<br>\n            天气：${w.cond}<br>\n            施工影响：${w.imp}<br>\n            延期天数：${w.delay}<br>\n            照片数：${w.photos.length}张\n          </description>\n          <Point>\n            <coordinates>${AFIF.lng},${AFIF.lat},0</coordinates>\n          </Point>\n        </Placemark>`;
  });
  kml += `\n    </Folder>\n  </Document>\n</kml>`;

  zip.file("doc.kml", kml);
  const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = buildExportFileName('kmz');
  a.click();
  URL.revokeObjectURL(url);

  setStatus("✅ KMZ导出成功（包含所有照片）");
  setTimeout(() => alert("KMZ文件已下载，包含所有标注/天气照片！"), 200);
}

  importedLayers.forEach((lay) => {
    if (lay.type === 'label') {
      kml += `\n        <Placemark>\n          <name>${lay.name || '未命名标签'}</name>\n          <Point>\n            <coordinates>${lay.lng},${lay.lat},0</coordinates>\n          </Point>\n          <Style>\n            <LabelStyle>\n              <color>${hexToKmlColor(textColor)}</color>\n              <scale>1.2</scale>\n            </LabelStyle>\n          </Style>\n        </Placemark>`;
    }
    if (lay.type === 'polyline') {
      const coords = lay.latlngs.map((p) => `${p[1]},${p[0]},0`).join(' ');
      kml += `\n        <Placemark>\n          <name>施工线路</name>\n          <styleUrl>#areaStyle</styleUrl>\n          <LineString>\n            <coordinates>${coords}</coordinates>\n          </LineString>\n        </Placemark>`;
    }
    if (lay.type === 'polygon') {
      const coords = lay.latlngs.map((p) => `${p[1]},${p[0]},0`).join(' ');
      kml += `\n        <Placemark>\n          <name>施工区域</name>\n          <styleUrl>#areaStyle</styleUrl>\n          <Polygon>\n            <outerBoundaryIs>\n              <LinearRing>\n                <coordinates>${coords}</coordinates>\n              </LinearRing>\n            </outerBoundaryIs>\n          </Polygon>\n        </Placemark>`;
    }
  });
  
  kml += `\n    </Folder>\n    <Folder>\n      <name>天气记录</name>`;
  weatherRecords.forEach((w, index) => {
    kml += `\n        <Placemark>\n          <name>天气记录_${index+1}</name>\n          <description>\n            日期：${w.date}<br>\n            天气：${w.cond}<br>\n            施工影响：${w.imp}<br>\n            延期天数：${w.delay}<br>\n            照片数：${w.photos.length}张\n          </description>\n          <Point>\n            <coordinates>${AFIF.lng},${AFIF.lat},0</coordinates>\n          </Point>\n        </Placemark>`;
  });
  kml += `\n    </Folder>\n  </Document>\n</kml>`;
  
  kmzZip.file("doc.kml", kml);
  const kmzBlob = await kmzZip.generateAsync({ type: "blob", compression: "DEFLATE" });
  zip.file(buildExportFileName('kmz'), kmzBlob);

  const allPhotosFolder = zip.folder("所有照片");
  const markerPhotosFolder = allPhotosFolder.folder("标注照片");
  const weatherPhotosFolder = allPhotosFolder.folder("天气照片");
  
  markers.forEach((m, markerIndex) => {
    m.photos.forEach((photo, photoIndex) => {
      const safeLabel = (m.label || `标注_${markerIndex+1}`).replace(/[^\w\-\u4e00-\u9fa5]/g, '_').slice(0, 64);
      const ext = photo.type.split('/')[1] || 'png';
      const fileName = `${safeLabel}_照片${photoIndex+1}.${ext}`;
      markerPhotosFolder.file(fileName, photo.data.split(',')[1], { base64: true });
    });
  });
  
  weatherRecords.forEach((w, weatherIndex) => {
    w.photos.forEach((photo, photoIndex) => {
      const ext = photo.type.split('/')[1] || 'png';
      const fileName = `天气记录_${weatherIndex+1}_照片${photoIndex+1}.${ext}`;
      weatherPhotosFolder.file(fileName, photo.data.split(',')[1], { base64: true });
    });
  });

  const finalBlob = await zip.generateAsync({ type: "blob", compression: "DEFLATE" });
  const url = URL.createObjectURL(finalBlob);
  const a = document.createElement("a");
  a.href = url;
  a.download = buildExportFileName('zip', '全部数据');
  a.click();
  URL.revokeObjectURL(url);

  setStatus("✅ 全部数据导出成功（Excel+KMZ+所有照片）");
}

function clearImportedLayers(){
  map.eachLayer(l=>{
    if(l.options?.interactive === false || l.options?.className === 'marker-label') map.removeLayer(l);
  });
  importedLayers = [];
  setStatus("✅ 已清空导入底图");
}

function clearAllMarkers(){
  if(!confirm("确定清空所有标注？")) return;
  markers.forEach(m=>{ map.removeLayer(m.marker); map.removeLayer(m.labelLayer); });
  markers = [];
  setStatus("✅ 已清空全部标注");
}

function generateFileName(prefix = "光伏施工", type) {
  const time = new Date().toISOString().slice(0, 19).replace(/:/g, "-");
  return `${prefix}_${time}.${type}`;
}

function getExportPrefixByTeam() {
  const date = new Date().toISOString().slice(0, 10);
  let team = '全部队伍';
  if (markers && markers.length > 0) {
    const t = markers.find(m => m.f1 && String(m.f1).trim());
    if (t) team = String(t.f1).trim();
  }
  team = team.replace(/[^\w\-\u4e00-\u9fa5]/g, '_').slice(0, 64);
  return `${date}_${team}`;
}

function buildExportFileName(type, suffix) {
  const prefix = getExportPrefixByTeam();
  return `${prefix}${suffix ? '_' + suffix : ''}.${type}`;
}

async function iconUrlToBase64(url) {
  if (!url) return url;
  if (url.startsWith('data:')) return url;
  try {
    const response = await fetch(url);
    const blob = await response.blob();
    return await new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(blob);
    });
  } catch (e) {
    console.warn('图标转换失败，使用原始链接:', url);
    return url;
  }
}

function hexToKmlColor(hex, opacity = 1) {
  hex = hex.replace('#', '');
  const r = hex.substring(0, 2);
  const g = hex.substring(2, 4);
  const b = hex.substring(4, 6);
  const aa = Math.round(opacity * 255).toString(16).padStart(2, '0');
  return aa + b + g + r;
}

function setStatus(text) {
  document.getElementById('status').textContent = text;
}

function generateSummary() {
  const totalMarkers = markers.length;
  const personMarkers = markers.filter(m => m.type === '人员').length;
  const materialMarkers = markers.filter(m => m.type === '材料').length;
  const machineMarkers = markers.filter(m => m.type === '机械').length;
  const customMarkers = markers.filter(m => m.type === '自定义').length;
  const totalMarkerPhotos = markers.reduce((sum, m) => sum + m.photos.length, 0);
  const totalWeatherRecords = weatherRecords.length;
  const totalWeatherPhotos = weatherRecords.reduce((sum, w) => sum + w.photos.length, 0);
  
  const summaryText = `
📊 数据汇总：
• 标注总数：${totalMarkers}
  - 人员：${personMarkers}
  - 材料：${materialMarkers}
  - 机械：${machineMarkers}
  - 自定义：${customMarkers}
• 标注照片总数：${totalMarkerPhotos}
• 天气记录数：${totalWeatherRecords}
• 天气照片总数：${totalWeatherPhotos}
  `;
  
  alert(summaryText);
  setStatus("✅ 数据汇总已生成");
}

function toggleLocate() {
  const btn = document.getElementById('locateBtn');
  btn.classList.toggle('active');
  
  if (btn.classList.contains('active')) {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          map.setView([lat, lng], 16);
          setStatus(`✅ 已定位到：${lat.toFixed(6)}, ${lng.toFixed(6)}`);
        },
        (err) => {
          alert(`定位失败：${err.message}`);
          btn.classList.remove('active');
          setStatus("❌ 定位失败");
        }
      );
    } else {
      alert("您的浏览器不支持定位功能");
      btn.classList.remove('active');
      setStatus("❌ 浏览器不支持定位");
    }
  } else {
    map.setView([AFIF.lat, AFIF.lng], AFIF.zoom);
    setStatus("✅ 已取消定位");
  }
}
</script>
