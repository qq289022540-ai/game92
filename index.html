<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端核心适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-status-bar-style" content="black-translucent">
    <title>光伏施工标注系统</title>
    <!-- 地图依赖 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Excel导出 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- ZIP备份 -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            overflow: hidden;
            background: #f5f5f5;
        }
        /* 地图容器 */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 120px;
            z-index: 1;
        }
        /* 工具栏 */
        #toolPanel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            max-height: 45vh;
            background: rgba(255,255,255,0.98);
            border-radius: 12px 12px 0 0;
            box-shadow: 0 -2px 15px rgba(0,0,0,0.1);
            z-index: 999;
            overflow-y: auto;
            padding: 10px;
        }
        /* 按钮样式 */
        .compact-btn {
            height: 38px;
            padding: 0 12px;
            font-size: 13px;
            margin: 4px 2px;
            border: none;
            border-radius: 6px;
            background: #409eff;
            color: white;
            cursor: pointer;
        }
        .compact-btn:hover {
            background: #337ecc;
        }
        .compact-btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 8px 0;
        }
        /* 状态栏 */
        #statusBar {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            z-index: 9999;
            font-size: 12px;
        }
        /* 移动端折叠按钮 */
        #foldBtn {
            width: 100%;
            background: #f5f5f5;
            color: #333;
            margin: 0 0 8px 0;
        }

        /* 移动端响应式 */
        @media (max-width: 768px) {
            #map {
                bottom: 120px !important;
            }
            .compact-btn {
                height: 38px !important;
                font-size: 13px !important;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="statusBar">准备就绪</div>
    
    <!-- 工具栏 -->
    <div id="toolPanel">
        <button id="foldBtn" class="compact-btn" onclick="togglePanel()">🔽 折叠/展开工具栏</button>
        <div class="compact-btn-group">
            <button class="compact-btn" onclick="getUserLocation()">📍 定位</button>
            <button class="compact-btn" onclick="exportMarkersToExcel()">📊 导出Excel</button>
            <button class="compact-btn" onclick="backupAllData()">🗂️ 备份ZIP</button>
            <button class="compact-btn" onclick="clearAllMarkers()">🗑️ 清空标注</button>
        </div>
    </div>

<script>
// 全局变量
let map;
let markers = [];
let weatherRecords = [];

// 初始化地图
window.onload = function() {
    // 初始化地图
    map = L.map('map').setView([30, 114], 13);
    // 高德地图底图
    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
        subdomains: ["1", "2", "3", "4"],
        attribution: '© 高德地图'
    }).addTo(map);

    // 地图点击标注
    map.on('click', function(e) {
        addMarker(e.latlng.lat, e.latlng.lng);
    });

    // 移动端检测
    const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
    if (isMobile) {
        setStatus("📱 移动端模式已开启");
    }
    setStatus("✅ 系统加载完成，点击地图标注");
};

// 添加标注
function addMarker(lat, lng) {
    const marker = L.marker([lat, lng]).addTo(map);
    const markerData = {
        id: Date.now(),
        type: "施工点",
        f1: "光伏标注",
        f2: "施工内容",
        f3: "1",
        lat: lat,
        lng: lng,
        remark: "移动端标注"
    };
    markers.push(markerData);
    marker.bindPopup(`标注点<br>纬度: ${lat.toFixed(6)}<br>经度: ${lng.toFixed(6)}`).openPopup();
    setStatus(`✅ 已添加标注，总计：${markers.length}个`);
}

// 高精度定位
function getUserLocation() {
    setStatus("⏳ 获取定位中...");
    if (!navigator.geolocation) {
        alert("设备不支持定位");
        return;
    }
    navigator.geolocation.getCurrentPosition(
        pos => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            map.setView([lat, lng], 18);
            addMarker(lat, lng);
            setStatus("✅ 定位成功，已添加标注");
        },
        err => {
            alert("定位失败：请开启GPS并允许权限！必须HTTPS访问");
            setStatus("❌ 定位失败");
        },
        { enableHighAccuracy: true, timeout: 10000 }
    );
}

// 修复版：导出Excel（兼容GitHub Pages）
function exportMarkersToExcel() {
    if (markers.length === 0) {
        alert("暂无标注数据可导出！");
        return;
    }
    try {
        const wb = XLSX.utils.book_new();
        const wsData = [
            ['标注类型', '名称', '内容', '数量', '备注', '纬度', '经度']
        ];
        markers.forEach(m => {
            wsData.push([
                m.type, m.f1, m.f2, m.f3, m.remark,
                m.lat.toFixed(6), m.lng.toFixed(6)
            ]);
        });
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        XLSX.utils.book_append_sheet(wb, ws, '施工数据');

        // 核心修复下载
        const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
        const blob = new Blob([wbout], { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `光伏施工数据_${new Date().toLocaleDateString()}.xlsx`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        setStatus("✅ Excel导出成功！");
        alert("导出成功！文件已下载");
    } catch (e) {
        alert("导出失败：" + e.message);
        console.error(e);
    }
}

// 修复版：备份ZIP（兼容GitHub Pages）
async function backupAllData() {
    if (markers.length === 0) {
        alert("暂无数据可备份！");
        return;
    }
    setStatus("⏳ 生成备份文件...");
    try {
        const zip = new JSZip();
        zip.file("标注数据.json", JSON.stringify(markers, null, 2));
        
        const blob = await zip.generateAsync({ type: "blob" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `光伏施工备份_${new Date().toLocaleDateString()}.zip`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        setStatus("✅ 备份完成！");
        alert("备份成功！ZIP文件已下载");
    } catch (e) {
        alert("备份失败：" + e.message);
        console.error(e);
    }
}

// 清空标注
function clearAllMarkers() {
    if (!confirm("确定清空所有标注？")) return;
    markers.forEach(() => map.remove());
    markers = [];
    setStatus("🗑️ 已清空所有标注");
}

// 工具栏折叠
function togglePanel() {
    const panel = document.getElementById('toolPanel');
    if (panel.style.maxHeight === "60px") {
        panel.style.maxHeight = "45vh";
    } else {
        panel.style.maxHeight = "60px";
    }
}

// 状态提示
function setStatus(text) {
    document.getElementById('statusBar').innerText = text;
}
</script>
</body>
</html>
